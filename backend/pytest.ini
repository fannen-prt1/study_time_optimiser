[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider

markers =
    auth: Authentication tests
    crud: CRUD operation tests
    analytics: Analytics endpoint tests
    edge: Edge case tests
    slow: Slow running tests
