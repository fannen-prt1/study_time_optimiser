services:
  - type: web
    name: study-optimizer-backend
    env: python
    region: oregon
    plan: free
    runtime: python
    buildCommand: rm -rf .venv && pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
