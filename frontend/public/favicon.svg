<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#137fec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#137fec" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#grad1)" filter="url(#shadow)"/>
  <!-- Sparkle/Star icon representing AI -->
  <g fill="white" transform="translate(256, 256)">
    <!-- Main star -->
    <path d="M0,-120 L20,-40 L100,-40 L35,10 L55,90 L0,45 L-55,90 L-35,10 L-100,-40 L-20,-40 Z" opacity="1"/>
    <!-- Small sparkle top-right -->
    <circle cx="85" cy="-85" r="16" opacity="0.8"/>
    <!-- Small sparkle bottom-left -->
    <circle cx="-75" cy="75" r="12" opacity="0.6"/>
    <!-- Tiny sparkle -->
    <circle cx="60" cy="60" r="8" opacity="0.5"/>
  </g>
</svg>
